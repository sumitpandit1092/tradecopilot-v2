name: TradeCopilot Scanner

on:
  # Schedule trigger removed -- the scanner now runs 24/7 on a real EC2
  # instance (see deploy/), so this would otherwise double-alert and
  # keep a second, separate trade journal. Left as workflow_dispatch
  # only so it can still be run manually if the EC2 box is ever down.
  workflow_dispatch: {}

permissions:
  contents: write

# Serializes runs so two scheduled ticks never race to commit/push
# state/ at the same time.
concurrency:
  group: scanner
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install --upgrade --no-cache-dir git+https://github.com/rongardF/tvdatafeed.git

      - name: Run scanner (single pass)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TV_USERNAME: ${{ secrets.TV_USERNAME }}
          TV_PASSWORD: ${{ secrets.TV_PASSWORD }}
        run: python run_scanner_once.py

      - name: Persist state
        run: |
          git config user.name "tradecopilot-bot"
          git config user.email "actions@users.noreply.github.com"
          git add state/
          git diff --cached --quiet || git commit -m "chore: update scanner state [skip ci]"
          git push
